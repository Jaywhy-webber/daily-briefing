name: Daily Briefing Pipeline

on:
  # Run every day at 06:00 SGT (= 22:00 UTC previous day)
  schedule:
    - cron: '0 22 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write   # needed to commit generated output back to repo

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        run: |
          cd pipeline
          python run_pipeline.py --output-dir ../output

      - name: Commit generated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "chore: daily briefing $(date -u +'%Y-%m-%d')"
          git push
